<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>6/45 Lotto</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: white;
            width: 420px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 32px;
            color: #222;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 12px 0;
            border-radius: 10px;
            background-color: #4f7df3;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #3d68d8;
        }

        .btn-dark {
            background-color: #333;
        }

        .btn-dark:hover {
            background-color: #111;
        }

        .user-info {
            margin-bottom: 20px;
            color: #555;
            font-size: 15px;
        }

        .login-area {
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }

        .login-area a {
            color: #4f7df3;
            text-decoration: none;
            font-weight: bold;
        }

        .login-area a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>6/45 Lotto</h1>

            {% if user.is_authenticated %}
            <div class="user-info">
                {{ user.username }}님 로그인 중
            </div>
            {% endif %}

            <a href="{% url 'purchase' %}" class="btn">로또 구매</a>
            <a href="{% url 'my_tickets' %}" class="btn">내 복권</a>
            <a href="{% url 'lotto_admin_home' %}" class="btn btn-dark">관리자</a>

            <div class="login-area">
                {% if user.is_authenticated %}
                <a href="{% url 'logout' %}">로그아웃</a>
                {% else %}
                <a href="{% url 'login' %}">로그인</a>
                |
                <a href="{% url 'signup' %}">회원가입</a>
                {% endif %}
            </div>
        </div>
    </div>
</body>

</html>
