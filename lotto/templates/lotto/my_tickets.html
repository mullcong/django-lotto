{% extends "lotto/base.html" %}

{% block content %}
<h2>내 복권 목록</h2>

<table>
    <tr>
        <th>회차</th>
        <th>구매 방식</th>
        <th>번호</th>
        <th>가격</th>
        <th>구매일</th>
    </tr>

    {% for ticket in tickets %}
    <tr>
        <td>{{ ticket.round_number }}</td>
        <td>{{ ticket.get_buy_type_display }}</td>
        <td>{{ ticket.numbers }}</td>
        <td>{{ ticket.price }}원</td>
        <td>{{ ticket.created_at }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">구매한 복권이 없습니다.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
