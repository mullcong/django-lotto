<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>추첨 결과</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 600px;
            background: white;
            border-radius: 22px;
            padding: 55px 45px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 34px;
            font-weight: 800;
            color: #222;
        }

        .round {
            font-size: 18px;
            font-weight: 800;
            color: #222;
            margin-bottom: 20px;
        }

        .result-box {
            background: #f5f6fa;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .balls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ball {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #4f7df3;
            color: white;
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            width: 100%;
            height: 58px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blue {
            background: #4f7df3;
        }

        .blue:hover {
            background: #416ee0;
        }

        .gray {
            background: #888;
        }

        .gray:hover {
            background: #777;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>추첨 결과</h1>

        <div class="result-box">
            <div class="round">{{ result.round_number }}회차 당첨 번호</div>

            <div class="balls">
                <div class="ball">{{ result.number1 }}</div>
                <div class="ball">{{ result.number2 }}</div>
                <div class="ball">{{ result.number3 }}</div>
                <div class="ball">{{ result.number4 }}</div>
                <div class="ball">{{ result.number5 }}</div>
                <div class="ball">{{ result.number6 }}</div>
            </div>
        </div>

        <div class="menu">
            <a href="{% url 'winning_history' %}" class="btn blue">당첨 내역 확인</a>
            <a href="{% url 'lotto_admin_home' %}" class="btn gray">관리자 메인으로</a>
        </div>
    </div>

</body>

</html>
