<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>당첨 확인</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .container {
            width: 700px;
            background: white;
            border-radius: 22px;
            padding: 50px 45px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 28px;
            font-size: 34px;
            font-weight: 800;
            color: #222;
        }

        .box {
            background: #f5f6fa;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            color: #222;
            margin-bottom: 12px;
        }

        .text {
            font-size: 16px;
            font-weight: 600;
            color: #444;
        }

        .empty {
            color: #555;
            font-size: 17px;
            font-weight: 600;
            margin: 35px 0;
        }

        .btn {
            width: 100%;
            height: 58px;
            border-radius: 12px;
            background: #888;
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
        }

        .btn:hover {
            background: #777;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>당첨 확인</h1>

        {% if results %}
        {% for item in results %}
        <div class="box">
            <div class="title">{{ item.ticket.round_number }}회차</div>
            <div class="text">{{ item.message }}</div>
        </div>
        {% endfor %}
        {% else %}
        <p class="empty">확인할 당첨 결과가 없습니다.</p>
        {% endif %}

        <a href="{% url 'home' %}" class="btn">메인으로</a>
    </div>

</body>

</html>
