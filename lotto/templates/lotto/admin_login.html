{% extends "lotto/base.html" %}

{% block content %}
<h1>관리자 로그인</h1>

<form method="post">
    {% csrf_token %}

    <input type="text" name="username" placeholder="관리자 아이디">
    <input type="password" name="password" placeholder="관리자 비밀번호">

    <button class="btn admin" type="submit">관리자 로그인</button>
</form>

<div class="small-text">
    관리자 권한이 있는 계정만 접속할 수 있습니다.
</div>

<br>
<a class="btn gray" href="{% url 'home' %}">메인으로</a>
{% endblock %}
