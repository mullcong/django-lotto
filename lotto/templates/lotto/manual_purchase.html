<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>수동 구매</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .container {
            width: 650px;
            background: white;
            border-radius: 22px;
            padding: 45px 45px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 34px;
            font-weight: 800;
            color: #222;
        }

        .desc {
            margin: 0 0 26px;
            color: #555;
            font-size: 16px;
            font-weight: 600;
        }

        .numbers {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .number-item input {
            display: none;
        }

        .number-item label {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin: 0 auto;
        }

        .number-item input:checked+label {
            background: #4f7df3;
            border-color: #4f7df3;
            color: white;
        }

        .error {
            color: #e53935;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .blue {
            background: #4f7df3;
        }

        .blue:hover {
            background: #416ee0;
        }

        .gray {
            background: #888;
        }

        .gray:hover {
            background: #777;
        }
    </style>
</head>

    <div class="container">
        <h1>수동 구매</h1>

        <p class="desc">1부터 45까지 숫자 중 정확히 6개를 선택하세요.</p>

        {% endif %}
