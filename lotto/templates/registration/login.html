<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>로그인</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: white;
            width: 420px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 30px;
            color: #222;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-top: 25px;
            border-radius: 10px;
            background-color: #4f7df3;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #3d68d8;
        }

        .btn-gray {
            background-color: #777;
            margin-top: 12px;
        }

        .btn-gray:hover {
            background-color: #555;
        }

        .error-message {
            background-color: #ffe5e5;
            color: #d63031;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        .bottom-text {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #555;
        }

        .bottom-text a {
            color: #4f7df3;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>로그인</h1>

            {% if form.errors %}
            <div class="error-message">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <label for="id_username">아이디</label>
                {{ form.username }}

                <label for="id_password">비밀번호</label>
                {{ form.password }}

                <button type="submit" class="btn">로그인</button>
            </form>

            <a href="{% url 'home' %}" class="btn btn-gray">메인으로 돌아가기</a>

            <div class="bottom-text">
                계정이 없나요?
                <a href="{% url 'signup' %}">회원가입</a>
            </div>
        </div>
    </div>
</body>

</html>
